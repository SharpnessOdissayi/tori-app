      margin-top: 32px; width: 32px; height: 32px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.2); border-top-color: #fff;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

<body>
  <!--
    This page is the OFFLINE FALLBACK. On every launch, Capacitor loads
    https://www.kavati.net/dashboard (per capacitor.config.ts > server.url).

      (a) the device has no internet, or
      (b) Apple reviewer turns off network during review (this is why we need it).
  -->
